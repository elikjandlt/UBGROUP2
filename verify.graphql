query Verify($language: String) {
  cpPages(language: $language) {
    _id
    name
    slug
    status
  }
  cpPosts(language: $language, status: published) {
    _id
    title
    slug
  }
  header: cpMenus(language: $language, kind: "header") {
    _id
    label
    url
    order
  }
  footer: cpMenus(language: $language, kind: "footer") {
    _id
    label
    url
    order
  }
}
